<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Papillion Fast Food - المنيو</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Bebas+Neue&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111111;
      --bg-card: #1a1a1a;
      --bg-card-hover: #222222;
      --accent-1: #FF6B00;
      --accent-2: #FFB800;
      --accent-gradient: linear-gradient(135deg, #FF6B00, #FFB800);
      --accent-glow: rgba(255, 107, 0, 0.4);
      --text-primary: #FFFFFF;
      --text-secondary: #AAAAAA;
      --text-muted: #666666;
      --border: rgba(255, 107, 0, 0.15);
      --border-bright: rgba(255, 107, 0, 0.5);
      --radius: 16px;
      --radius-sm: 10px;
      --shadow-card: 0 8px 32px rgba(0,0,0,0.5);
      --shadow-glow: 0 0 30px rgba(255,107,0,0.2);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Tajawal', 'Cairo', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ───── BACKGROUND PARTICLES ───── */
    .bg-particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.04;
      animation: floatParticle linear infinite;
    }
    .particle:nth-child(1)  { width:300px;height:300px;background:var(--accent-1);left:10%;top:20%;animation-duration:25s;animation-delay:-5s; }
    .particle:nth-child(2)  { width:200px;height:200px;background:var(--accent-2);left:70%;top:60%;animation-duration:30s;animation-delay:-10s; }
    .particle:nth-child(3)  { width:150px;height:150px;background:var(--accent-1);left:40%;top:80%;animation-duration:20s;animation-delay:-15s; }
    .particle:nth-child(4)  { width:250px;height:250px;background:var(--accent-2);left:85%;top:10%;animation-duration:35s;animation-delay:-8s; }

    @keyframes floatParticle {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(30px,-40px) scale(1.1); }
      66%  { transform: translate(-20px,20px) scale(0.9); }
      100% { transform: translate(0,0) scale(1); }
    }

    /* ───── LOADER ───── */
    #loader {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #loader.hidden { opacity: 0; visibility: hidden; }

    .loader-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      letter-spacing: 3px;
    }
    .loader-sub {
      font-family: 'Tajawal', sans-serif;
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    .loader-ring {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(255,107,0,0.15);
      border-top-color: var(--accent-1);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    .loader-dots {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }
    .loader-dots span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent-1);
      animation: dotBounce 1.4s ease infinite;
    }
    .loader-dots span:nth-child(1) { animation-delay: 0s; }
    .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes dotBounce {
      0%,80%,100% { transform: scale(0.8); opacity:0.5; }
      40% { transform: scale(1.2); opacity:1; }
    }

    /* ───── MAIN WRAPPER ───── */
    #app {
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    #app.visible { opacity:1; transform:translateY(0); }

    /* ───── HERO HEADER ───── */
    .hero {
      position: relative;
      text-align: center;
      padding: 60px 20px 40px;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,107,0,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-block;
      background: rgba(255,107,0,0.12);
      border: 1px solid var(--border-bright);
      color: var(--accent-1);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 50px;
      margin-bottom: 20px;
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,107,0,0.3); }
      50% { box-shadow: 0 0 0 8px rgba(255,107,0,0); }
    }
    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 7rem);
      line-height: 0.9;
      letter-spacing: 4px;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 40px rgba(255,107,0,0.4));
    }
    .hero-subtitle {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: var(--text-secondary);
      font-weight: 300;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .hero-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 16px;
    }
    .hero-line::before, .hero-line::after {
      content: '';
      height: 1px;
      width: 80px;
      background: var(--accent-gradient);
    }
    .hero-line span {
      font-size: 1.4rem;
    }

    /* ───── TABS ───── */
    .tabs-wrapper {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
    }
    .tabs-scroll {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 10px 0;
      justify-content: center;
      flex-wrap: wrap;
    }
    .tabs-scroll::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      font-family: 'Tajawal', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 50px;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tab-btn:hover {
      color: var(--text-primary);
      border-color: var(--border-bright);
      background: rgba(255,107,0,0.08);
    }
    .tab-btn.active {
      background: var(--accent-gradient);
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 20px rgba(255,107,0,0.4);
    }
    .tab-icon { font-size: 1rem; }

    /* ───── CONTENT ───── */
    .content-area {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ───── SECTION HEADER ───── */
    .section-header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeUp 0.6s ease both;
    }
    .section-icon {
      font-size: 3.5rem;
      margin-bottom: 12px;
      display: block;
      filter: drop-shadow(0 0 20px rgba(255,107,0,0.5));
      animation: iconFloat 3s ease infinite;
    }
    @keyframes iconFloat {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .section-title {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 900;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .section-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }
    .section-divider::before, .section-divider::after {
      content: '';
      height: 2px;
      width: 60px;
      background: var(--accent-gradient);
      border-radius: 2px;
    }
    .section-divider span { color: var(--accent-1); font-size: 1.2rem; }

    /* ───── LOADING SECTION ───── */
    .section-loading {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
    }
    .section-loading .mini-ring {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,107,0,0.15);
      border-top-color: var(--accent-1);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 16px;
    }

    /* ───── MENU GRID ───── */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* ───── MENU CARD ───── */
    .menu-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      position: relative;
      overflow: hidden;
      cursor: default;
      transition: var(--transition);
      animation: cardReveal 0.5s ease both;
      opacity: 0;
      transform: translateY(30px) scale(0.97);
    }
    .menu-card.revealed {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .menu-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-gradient);
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: inherit;
    }
    .menu-card:hover {
      border-color: var(--border-bright);
      box-shadow: var(--shadow-card), var(--shadow-glow);
      transform: translateY(-4px) scale(1.01);
    }
    .menu-card:hover::before { opacity: 0.04; }

    .card-number {
      position: absolute;
      top: 16px;
      left: 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: rgba(255,107,0,0.12);
      line-height: 1;
      pointer-events: none;
    }
    .card-body {
      position: relative;
      z-index: 1;
    }
    .card-name {
      font-family: 'Cairo', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .card-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 16px;
      min-height: 40px;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }
    .card-price {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .card-price-unit {
      font-family: 'Tajawal', sans-serif;
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-top: 2px;
    }
    .card-badge {
      background: rgba(255,107,0,0.1);
      border: 1px solid rgba(255,107,0,0.3);
      color: var(--accent-1);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 50px;
    }

    /* ───── OFFERS SPECIAL CARD ───── */
    .offer-card {
      background: linear-gradient(135deg, rgba(255,107,0,0.12), rgba(255,184,0,0.08));
      border-color: rgba(255,184,0,0.3);
    }
    .offer-card .card-name { color: #FFB800; }

    /* ───── VIDEO BUTTON ───── */
    .video-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 12px;
      background: linear-gradient(135deg, rgba(255,0,80,0.1), rgba(0,242,234,0.06));
      border: 1px solid rgba(255,0,80,0.35);
      color: #ff2d55;
      font-family: 'Tajawal', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 8px 14px;
      border-radius: 50px;
      cursor: pointer;
      transition: var(--transition);
      width: 100%;
      justify-content: center;
      letter-spacing: 0.5px;
    }
    .video-btn:hover {
      background: linear-gradient(135deg, rgba(255,0,80,0.22), rgba(0,242,234,0.12));
      box-shadow: 0 0 20px rgba(255,0,80,0.22);
      transform: translateY(-1px);
      border-color: rgba(255,0,80,0.6);
    }
    .video-btn svg { width:15px; height:15px; flex-shrink:0; }
    .video-btn .play-dot {
      width: 7px; height: 7px;
      background: #ff2d55;
      border-radius: 50%;
      animation: blink 1.4s ease infinite;
      flex-shrink: 0;
    }
    /* Facebook variant */
    .video-btn.fb-btn {
      background: linear-gradient(135deg, rgba(24,119,242,0.12), rgba(66,183,242,0.08));
      border-color: rgba(24,119,242,0.4);
      color: #4a9eff;
    }
    .video-btn.fb-btn:hover {
      background: linear-gradient(135deg, rgba(24,119,242,0.25), rgba(66,183,242,0.15));
      box-shadow: 0 0 20px rgba(24,119,242,0.25);
      border-color: rgba(24,119,242,0.7);
    }
    .fb-dot { background: #1877F2 !important; }
    @keyframes blink {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.3; transform:scale(0.65); }
    }

    /* ───── VIDEO MODAL ───── */
    #videoModal {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    #videoModal.open { opacity:1; visibility:visible; }
    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(14px);
      cursor: pointer;
    }
    .modal-box {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 360px;
      background: var(--bg-card);
      border: 1px solid rgba(255,0,80,0.22);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0,0,0,0.75), 0 0 60px rgba(255,0,80,0.1);
      transform: scale(0.88) translateY(24px);
      transition: transform 0.38s cubic-bezier(0.34,1.56,0.64,1);
    }
    #videoModal.open .modal-box { transform: scale(1) translateY(0); }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,0,80,0.05);
    }
    .modal-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Cairo', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .modal-title svg { width:17px; height:17px; color:#ff2d55; }
    .modal-close {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-secondary);
      width: 30px; height: 30px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: var(--transition);
    }
    .modal-close:hover { background:rgba(255,50,50,0.2); color:#fff; }
    .modal-item-name {
      padding: 12px 18px 4px;
      font-family: 'Cairo', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .modal-video-wrap {
      position: relative;
      width: 100%;
      height: 540px;
      background: #000;
      overflow: hidden;
    }
    .modal-video-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .modal-video-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #000;
      color: var(--text-muted);
      font-size: 0.82rem;
      z-index: 2;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .modal-video-loading.hide { opacity:0; }
    .modal-video-loading .mini-ring {
      width: 34px; height: 34px;
      border: 3px solid rgba(255,0,80,0.15);
      border-top-color: #ff2d55;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    .modal-open-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin: 12px 18px 16px;
      padding: 9px 16px;
      background: rgba(255,0,80,0.07);
      border: 1px solid rgba(255,0,80,0.22);
      border-radius: var(--radius-sm);
      color: #ff2d55;
      font-family: 'Tajawal', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      text-decoration: none;
      transition: var(--transition);
    }
    .modal-open-link:hover { background:rgba(255,0,80,0.16); }

    /* ───── EMPTY STATE ───── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .empty-state .emoji { font-size: 4rem; margin-bottom: 16px; display: block; }
    .empty-state p { font-size: 1rem; }

    /* ───── CONTACT TAB ───── */
    .contact-hero {
      text-align: center;
      margin-bottom: 50px;
      animation: fadeUp 0.5s ease both;
    }
    .contact-hero .section-icon { font-size: 4rem; }

    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      max-width: 800px;
      margin: 0 auto;
    }

    .contact-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      text-align: center;
      animation: fadeUp 0.5s ease both;
      transition: var(--transition);
    }
    .contact-card:hover {
      border-color: var(--border-bright);
      box-shadow: var(--shadow-card), var(--shadow-glow);
      transform: translateY(-3px);
    }
    .contact-card-icon {
      font-size: 2.5rem;
      margin-bottom: 14px;
      display: block;
    }
    .contact-card-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .phone-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,107,0,0.06);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      margin-bottom: 10px;
      gap: 12px;
      direction: ltr;
    }
    .phone-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      color: var(--text-primary);
      letter-spacing: 2px;
    }
    .copy-btn {
      background: rgba(255,107,0,0.15);
      border: 1px solid rgba(255,107,0,0.3);
      color: var(--accent-1);
      font-family: 'Tajawal', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .copy-btn:hover { background: rgba(255,107,0,0.3); }
    .copy-btn.copied { background: rgba(0,200,100,0.2); border-color: rgba(0,200,100,0.4); color: #00c864; }

    .social-section {
      max-width: 500px;
      margin: 40px auto 0;
    }
    .social-label {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .social-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .social-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 24px;
      border-radius: var(--radius-sm);
      text-decoration: none;

  <script>
    const SHEET_ID = '1kl1hwOG3nxneJQWOgp8KXbtXpFZrKEZ0Enk5TivwLb8';

    const SHEETS = [
      { name: 'سندوتشات المارين', icon: '🥖', color: 'default' },
      { name: 'صوووواريخ سوري',   icon: '🚀', color: 'default' },
      { name: 'سماش برجر',        icon: '🍔', color: 'default' },
      { name: 'تشيكن برجر',       icon: '🍗', color: 'default' },
      { name: 'قلبوظة',           icon: '🌮', color: 'default' },

    const CONTACT_TAB = { name: 'تواصل معنا', icon: '📞', id: 'contact' };

    let activeTab = null;
    const loadedData = {};

    /* ─── GViz JSON fetch ─── */
    async function fetchSheet(sheetName) {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
      const res  = await fetch(url);
      const text = await res.text();
      // Strip the JSONP wrapper: google.visualization.Query.setResponse({...});
      const json = JSON.parse(text.replace(/^[^(]*\(/, '').replace(/\);?\s*$/, ''));
      const rows = json.table?.rows || [];
      return rows
        .map(r => ({
          no:     r.c?.[0]?.v ?? '',
          name:   r.c?.[1]?.v ?? '',
          desc:   r.c?.[2]?.v ?? '',
          price:  r.c?.[3]?.v ?? '',
          social: r.c?.[4]?.v ?? '',
        }))
        .filter(r => r.name && String(r.name).trim() !== '');
    }

    /* ─── Build Tabs ─── */
    function buildTabs() {
      const container = document.getElementById('tabsContainer');
      const contentArea = document.getElementById('contentArea');

      // Menu Tabs
      SHEETS.forEach((sheet, i) => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn';
        btn.dataset.tab = `sheet-${i}`;
        btn.innerHTML = `<span class="tab-icon">${sheet.icon}</span>${sheet.name}`;
        btn.onclick = () => switchTab(`sheet-${i}`);
        container.appendChild(btn);

        const panel = document.createElement('div');
        panel.className = 'tab-panel';
        panel.id = `panel-sheet-${i}`;
        panel.innerHTML = `
          <div class="section-header">
            <span class="section-icon">${sheet.icon}</span>
            <div class="section-title">${sheet.name}</div>
            <div class="section-divider"><span>✦</span></div>
          </div>
          <div class="section-loading" id="loading-${i}">
            <div class="mini-ring"></div>
            <p>جاري تحميل الأصناف...</p>
          </div>
          <div class="menu-grid" id="grid-${i}" style="display:none"></div>
        `;
        contentArea.appendChild(panel);
      });

      // Contact Tab
      const cBtn = document.createElement('button');
      cBtn.className = 'tab-btn';
      cBtn.dataset.tab = 'contact';
      cBtn.innerHTML = `<span class="tab-icon">${CONTACT_TAB.icon}</span>${CONTACT_TAB.name}`;
      cBtn.onclick = () => switchTab('contact');
      container.appendChild(cBtn);

      const cPanel = document.createElement('div');
      cPanel.className = 'tab-panel';
      cPanel.id = 'panel-contact';
      cPanel.innerHTML = buildContactHTML();
      contentArea.appendChild(cPanel);

      // Default first tab
      switchTab('sheet-0');
    }

    /* ─── Switch Tab ─── */
    function switchTab(tabId) {
      // Update buttons
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === tabId);
      });
      // Update panels
      document.querySelectorAll('.tab-panel').forEach(p => {
        p.classList.toggle('active', p.id === `panel-${tabId}`);
      });
      activeTab = tabId;

      // Load data if sheet tab
      if (tabId.startsWith('sheet-')) {
        const idx = parseInt(tabId.split('-')[1]);
        loadSheetIfNeeded(idx);
      }

      // Scroll tabs into view
      const btn = document.querySelector(`.tab-btn[data-tab="${tabId}"]`);
      if (btn) btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    /* ─── Load Sheet ─── */
    async function loadSheetIfNeeded(idx) {
      if (loadedData[idx] !== undefined) return;
      loadedData[idx] = null; // Mark as loading

      const sheet = SHEETS[idx];
      const loadingEl = document.getElementById(`loading-${idx}`);
      const gridEl    = document.getElementById(`grid-${idx}`);

      try {
        const items = await fetchSheet(sheet.name);
        loadedData[idx] = items;

        loadingEl.style.display = 'none';
        gridEl.style.display = 'grid';

        if (!items.length) {
          gridEl.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><span class="emoji">🍽️</span><p>لا توجد أصناف في هذا القسم حتى الآن</p></div>`;
          return;
        }

        items.forEach((item, i) => {
          const isOffer = sheet.color === 'offer';
          const hasVideo = item.social && String(item.social).trim() !== '';
          const platform = hasVideo ? detectPlatform(String(item.social)) : null;
          const card = document.createElement('div');
          card.className = `menu-card${isOffer ? ' offer-card' : ''}`;
          card.style.animationDelay = `${i * 0.06}s`;

          let videoBtnHTML = '';

            if (platform === 'facebook') {
              videoBtnHTML = `

                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                <span class="play-dot fb-dot"></span>
                شاهد الفيديو على فيسبوك
              </button>`;
            } else {
              videoBtnHTML = `
              <button class="video-btn" onclick="openVideoModal('${escAttr(String(item.social))}','${escAttr(String(item.name))}','tiktok')">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.77a4.85 4.85 0 01-1.01-.08z"/></svg>
                <span class="play-dot"></span>
                شاهد الفيديو على تيك توك
              </button>`;
            }
          }

          card.innerHTML = `
            <div class="card-number">${String(item.no).padStart(2,'0') || String(i+1).padStart(2,'0')}</div>
            <div class="card-body">
              <div class="card-name">${escHtml(String(item.name))}</div>
              <div class="card-desc">${item.desc ? escHtml(String(item.desc)) : ''}</div>
              ${videoBtnHTML}
              <div class="card-footer">
                <div>
                  <div class="card-price">${item.price !== '' ? item.price : '—'}</div>
                  <div class="card-price-unit">جنيه مصري</div>
                </div>
                <div class="card-badge">${isOffer ? '🎁 عرض' : sheet.icon + ' ' + sheet.name}</div>
              </div>
            </div>
          `;
          gridEl.appendChild(card);

          // Staggered reveal
          setTimeout(() => card.classList.add('revealed'), 50 + i * 60);
        });

      } catch (err) {
        loadingEl.innerHTML = `<div class="error-msg">⚠️ تعذّر تحميل بيانات "${sheet.name}". تأكد أن الجدول مشاركٌ للعموم.<br><small>${err.message}</small></div>`;
        console.error(err);
      }
    }

    /* ─── Contact HTML ─── */
    function buildContactHTML() {

               target="_blank" rel="noopener" class="social-btn whatsapp">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>

    /* ─── Copy Phone ─── */
    function copyPhone(btn, number) {
      navigator.clipboard.writeText(number).then(() => {
        const original = btn.textContent;
        btn.textContent = '✓ تم النسخ';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = original;
          btn.classList.remove('copied');
        }, 2000);
      }).catch(() => {
        // Fallback
        const el = document.createElement('textarea');
        el.value = number;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        btn.textContent = '✓ تم';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'نسخ'; btn.classList.remove('copied'); }, 2000);
      });
    }

    /* ─── HTML escape ─── */
    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(str) {
      return str.replace(/'/g,'&#39;').replace(/"/g,'&quot;');
    }

    /* ─── Detect Platform ─── */
    function detectPlatform(url) {
      if (/tiktok\.com|vt\.tiktok\.com|vm\.tiktok\.com/i.test(url)) return 'tiktok';
      if (/facebook\.com|fb\.watch|fb\.com/i.test(url))             return 'facebook';
      return 'unknown';
    }

    /* ─── Extract TikTok Video ID ─── */
    function getTikTokVideoId(url) {
      const m = url.match(/\/video\/(\d+)/);
      return m ? m[1] : null;
    }

    /* ─── Build Facebook Embed URL ─── */
    function getFacebookEmbedUrl(url) {
      return `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&show_text=false&autoplay=false&width=500`;
    }

    /* ─── Open Video Modal ─── */
    function openVideoModal(url, itemName, platform) {
      const modal     = document.getElementById('videoModal');
      const iframe    = document.getElementById('modalIframe');
      const loader    = document.getElementById('modalLoader');
      const nameEl    = document.getElementById('modalItemName');
      const extLink   = document.getElementById('modalExternalLink');
      const modalTitle= document.getElementById('modalTitleText');
      const videoWrap = document.querySelector('.modal-video-wrap');

      // Auto-detect if not passed
      if (!platform) platform = detectPlatform(url);

      nameEl.textContent = itemName || '';
      extLink.href = url;

      // Update modal header per platform
      if (platform === 'facebook') {
        extLink.textContent = '↗ فتح في فيسبوك';
        extLink.style.color = '#4a9eff';
        extLink.style.borderColor = 'rgba(24,119,242,0.25)';
        extLink.style.background  = 'rgba(24,119,242,0.07)';
        if (modalTitle) modalTitle.textContent = 'شاهد الفيديو';
        document.getElementById('modalHeaderIcon').innerHTML = `<svg width="17" height="17" viewBox="0 0 24 24" fill="#4a9eff"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>`;
      } else {
        extLink.textContent = '↗ فتح في تيك توك';
        extLink.style.color = '#ff2d55';
        extLink.style.borderColor = 'rgba(255,0,80,0.22)';
        extLink.style.background  = 'rgba(255,0,80,0.07)';
        if (modalTitle) modalTitle.textContent = 'شاهد الفيديو';
        document.getElementById('modalHeaderIcon').innerHTML = `<svg width="17" height="17" viewBox="0 0 24 24" fill="#ff2d55"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.77a4.85 4.85 0 01-1.01-.08z"/></svg>`;
      }

      // Reset state
      loader.classList.remove('hide');
      loader.style.background = '';
      loader.innerHTML = `<div class="mini-ring"></div><span>جاري تحميل الفيديو...</span>`;
      iframe.src = '';
      iframe.style.display = 'block';

      if (platform === 'facebook') {
        const embedUrl = getFacebookEmbedUrl(url);
        iframe.onload = () => { loader.classList.add('hide'); };
        iframe.onerror = () => showFallback(videoWrap, url, itemName, 'facebook');
        iframe.src = embedUrl;
        setTimeout(() => {
          if (!loader.classList.contains('hide')) showFallback(videoWrap, url, itemName, 'facebook');
        }, 7000);

      } else {
        // TikTok
        const videoId = getTikTokVideoId(url);
        if (videoId) {
          const embedUrl = `https://www.tiktok.com/embed/v2/${videoId}`;
          iframe.onload = () => { loader.classList.add('hide'); };
          iframe.onerror = () => showFallback(videoWrap, url, itemName, 'tiktok');
          iframe.src = embedUrl;
          setTimeout(() => {
            if (!loader.classList.contains('hide')) showFallback(videoWrap, url, itemName, 'tiktok');
          }, 6000);
        } else {
          showFallback(videoWrap, url, itemName, 'tiktok');
        }
      }

      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

      const hint = isFb

      loader.innerHTML = `

            display:inline-flex;align-items:center;gap:10px;

    /* ─── Close Video Modal ─── */
    function closeVideoModal() {
      const modal  = document.getElementById('videoModal');
      const iframe = document.getElementById('modalIframe');
      modal.classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(() => { iframe.src = ''; }, 320);

    document.addEventListener('keydown', e => {

    window.addEventListener('DOMContentLoaded', () => {
